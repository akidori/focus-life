<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FL</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600&family=Noto+Sans+JP:wght@300;400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --border:rgba(255,255,255,0.32);
  --border2:rgba(255,255,255,0.18);
  --text:rgba(10,20,12,0.90);
  --text2:rgba(10,20,12,0.52);
  --text3:rgba(10,20,12,0.28);
  --shadow:rgba(0,30,10,0.15);
  --green:rgba(60,140,80,0.7);
}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;overflow:hidden;color:var(--text)}

/* FOREST BACKGROUND */
.forest{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 120% 60% at 50% 0%, rgba(20,60,20,0.95) 0%, transparent 55%),
    radial-gradient(ellipse 80% 80% at 10% 60%, rgba(10,45,15,0.9) 0%, transparent 50%),
    radial-gradient(ellipse 80% 80% at 90% 40%, rgba(15,55,20,0.85) 0%, transparent 50%),
    radial-gradient(ellipse 100% 50% at 50% 100%, rgba(5,25,8,1) 0%, transparent 60%),
    linear-gradient(180deg, #0d2e10 0%, #1a4a1e 25%, #0f3512 55%, #071a09 100%);
}

/* Tree silhouettes */
.forest::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 18% 35% at 8% 85%, rgba(5,18,7,1) 0%, transparent 100%),
    radial-gradient(ellipse 22% 45% at 20% 90%, rgba(4,15,6,1) 0%, transparent 100%),
    radial-gradient(ellipse 16% 30% at 35% 88%, rgba(6,20,8,1) 0%, transparent 100%),
    radial-gradient(ellipse 20% 40% at 50% 92%, rgba(3,12,5,1) 0%, transparent 100%),
    radial-gradient(ellipse 18% 35% at 65% 87%, rgba(5,18,7,1) 0%, transparent 100%),
    radial-gradient(ellipse 24% 50% at 80% 91%, rgba(4,15,6,1) 0%, transparent 100%),
    radial-gradient(ellipse 15% 28% at 93% 86%, rgba(6,20,8,1) 0%, transparent 100%);
}

/* Light rays through canopy */
.forest::after{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(175deg, rgba(120,200,80,0.06) 0%, transparent 40%),
    linear-gradient(168deg, rgba(100,180,60,0.04) 0%, transparent 35%),
    linear-gradient(182deg, rgba(140,210,90,0.05) 0%, transparent 45%);
  animation: rays 8s ease-in-out infinite alternate;
}
@keyframes rays{0%{opacity:.6}100%{opacity:1}}

/* Fog/mist layer */
.mist{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:
    radial-gradient(ellipse 100% 30% at 50% 70%, rgba(180,220,160,0.06) 0%, transparent 100%),
    radial-gradient(ellipse 80% 20% at 30% 80%, rgba(160,200,140,0.05) 0%, transparent 100%);
  animation: mist 12s ease-in-out infinite alternate;
}
@keyframes mist{0%{opacity:.4;transform:translateX(-8px)}100%{opacity:1;transform:translateX(8px)}}

/* RAIN CANVAS */
#rain{position:fixed;inset:0;z-index:2;pointer-events:none}

/* APP SHELL */
.app{
  position:relative;z-index:3;
  max-width:390px;margin:0 auto;
  height:100vh;display:flex;flex-direction:column;
  background:rgba(240,248,240,0.18);
  backdrop-filter:blur(32px) saturate(1.8) brightness(1.12);
  -webkit-backdrop-filter:blur(32px) saturate(1.8) brightness(1.12);
  border-right:1px solid rgba(255,255,255,0.12);
  border-left:1px solid rgba(255,255,255,0.12);
}

/* HEADER */
.hd{padding:22px 24px 0;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'DM Serif Display',serif;font-size:11px;letter-spacing:6px;color:var(--text3);text-transform:uppercase;font-style:italic}
.pill{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.42);border:1px solid var(--border);padding:5px 13px;border-radius:20px;box-shadow:0 2px 10px var(--shadow),inset 0 1px 0 rgba(255,255,255,0.8)}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(50,160,70,0.9);box-shadow:0 0 6px rgba(80,200,90,0.7);animation:dp 3s ease-in-out infinite}
@keyframes dp{0%,100%{opacity:1}50%{opacity:0.35}}
.pill-t{font-size:11px;font-weight:400;color:var(--text2);letter-spacing:.5px;font-variant-numeric:tabular-nums}

/* NAV */
.nav{display:flex;gap:2px;padding:16px 24px 0}
.tab{flex:1;padding:9px 4px;background:none;border:none;font-family:'Outfit',sans-serif;font-size:11px;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);cursor:pointer;transition:color .2s,border-color .2s;border-bottom:1px solid transparent;position:relative}
.tab.on{color:var(--text);border-bottom-color:rgba(10,20,12,0.3)}
.tab.on::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:rgba(60,180,80,0.8);box-shadow:0 0 7px rgba(60,200,80,0.7)}
.rule{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.45),transparent);margin:14px 24px 0}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:28px 24px 64px;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}
.pg{display:none}.pg.on{display:block;animation:pi .3s ease}
@keyframes pi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.lbl{font-size:9px;font-weight:400;letter-spacing:3px;text-transform:uppercase;color:var(--text3);margin-bottom:16px}

/* GLASS CARD */
.card{
  background:rgba(255,255,255,0.28);
  border:1px solid var(--border);
  border-radius:16px;padding:20px;margin-bottom:10px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 4px 24px var(--shadow),inset 0 1px 0 rgba(255,255,255,0.75);
  position:relative;overflow:hidden;
}

/* GATE */
.g-q{font-family:'DM Serif Display',serif;font-size:38px;line-height:1.15;color:var(--text);margin-bottom:10px;letter-spacing:-1px}
.g-q em{font-style:italic;color:rgba(40,120,50,0.8)}
.g-sub{font-size:12px;color:var(--text2);line-height:1.9;letter-spacing:.3px;margin-bottom:32px}
.axis{display:flex;align-items:center;margin-bottom:32px}
.axis-t{font-family:'Outfit',sans-serif;font-size:40px;font-weight:200;color:rgba(10,25,12,0.60);letter-spacing:-2px;line-height:1}
.axis-s{font-size:22px;color:var(--text3);margin:0 10px;font-weight:200}
.tp-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(10,20,12,0.08)}
.tp-n{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1px;min-width:20px}
.tp-t{font-size:14px;font-weight:300;color:var(--text2)}
.btns{display:flex;flex-direction:column;gap:8px;margin-top:32px}
.btn{width:100%;padding:15px 20px;border-radius:14px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:400;letter-spacing:1.5px;cursor:pointer;transition:all .18s}
.btn-y{background:rgba(255,255,255,0.48);border:1px solid rgba(255,255,255,0.6);color:var(--text);box-shadow:0 2px 12px var(--shadow),inset 0 1px 0 rgba(255,255,255,0.9)}
.btn-y:active{transform:scale(.99);background:rgba(255,255,255,0.62)}
.btn-n{background:rgba(255,255,255,0.18);border:1px solid var(--border2);color:var(--text2)}

/* MORNING */
.if-row{display:flex;align-items:center;gap:14px;padding:4px 0;margin-bottom:20px}
.if-n{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text3);min-width:24px;line-height:1;transition:color .2s}
.if-n.on{color:var(--text2)}
.if-i{flex:1;background:transparent;border:none;border-bottom:1px solid rgba(10,20,12,0.12);color:var(--text);padding:12px 2px;font-family:'Outfit','Noto Sans JP',sans-serif;font-size:14px;font-weight:300;outline:none;letter-spacing:.3px;transition:border-color .2s}
.if-i:focus{border-bottom-color:rgba(40,120,50,0.4)}
.if-i::placeholder{color:var(--text3);font-size:13px}
.mood-s{margin:28px 0 32px}.mood-r{display:flex;gap:6px}
.pip{flex:1;height:3px;border-radius:2px;background:rgba(10,20,12,0.10);cursor:pointer;transition:background .2s}
.pip.on{background:rgba(40,140,60,0.45)}
.mood-ls{display:flex;justify-content:space-between;margin-top:8px}
.mood-l{font-size:9px;color:var(--text3);letter-spacing:1px}

/* NIGHT */
.ci{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid rgba(10,20,12,0.08);cursor:pointer}
.ck{width:18px;height:18px;border:1.5px solid rgba(10,20,12,0.18);border-radius:5px;flex-shrink:0;position:relative;transition:all .2s;background:rgba(255,255,255,0.42)}
.ck.on{background:rgba(40,140,60,0.12);border-color:rgba(40,140,60,0.5);box-shadow:0 0 8px rgba(60,180,80,0.25)}
.ck.on::after{content:'';position:absolute;top:3px;left:2px;width:11px;height:6px;border-left:1.5px solid rgba(30,110,50,0.8);border-bottom:1.5px solid rgba(30,110,50,0.8);transform:rotate(-45deg)}
.ct{font-size:14px;font-weight:300;color:var(--text);letter-spacing:.2px;flex:1;transition:color .2s}
.ct.on{color:var(--text3);text-decoration:line-through}
.note-f{width:100%;background:rgba(255,255,255,0.28);border:1px solid var(--border2);border-radius:12px;color:var(--text);padding:14px 16px;font-family:'Outfit','Noto Sans JP',sans-serif;font-size:13px;font-weight:300;outline:none;resize:none;min-height:72px;letter-spacing:.3px;line-height:1.7;transition:border-color .2s;margin-bottom:32px}
.note-f::placeholder{color:var(--text3)}

/* STATS */
.kpi-r{display:flex;gap:8px;margin-bottom:12px}
.kpi{flex:1;background:rgba(255,255,255,0.36);border:1px solid var(--border);border-radius:14px;padding:16px 14px;box-shadow:0 2px 12px var(--shadow),inset 0 1px 0 rgba(255,255,255,0.85)}
.kpi-n{font-family:'Outfit',sans-serif;font-size:32px;font-weight:200;color:var(--text);line-height:1;letter-spacing:-1px}
.kpi-u{font-size:9px;color:var(--text3);letter-spacing:2px;margin-top:5px}
.bars{display:flex;align-items:flex-end;gap:5px;height:80px;margin-bottom:10px}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:7px;height:100%}
.bf{width:100%;border-radius:3px 3px 0 0;min-height:3px;background:rgba(10,20,12,0.08);transition:height .8s cubic-bezier(.34,1.2,.64,1)}
.bf.d{background:rgba(40,130,60,0.4)}.bf.t{background:rgba(60,180,80,0.55);box-shadow:0 0 8px rgba(60,200,80,0.25)}
.bd{font-size:9px;color:var(--text3)}
.h-row{display:flex;align-items:flex-start;gap:16px;padding:14px 0;border-bottom:1px solid rgba(10,20,12,0.08)}
.h-d{font-size:11px;color:var(--text3);min-width:38px;padding-top:1px;font-variant-numeric:tabular-nums}
.h-ts{flex:1}.h-t{font-size:12px;color:var(--text2);margin-bottom:3px;display:flex;align-items:center;gap:8px}
.h-t::before{content:'';width:4px;height:4px;border-radius:50%;background:rgba(10,20,12,0.15);flex-shrink:0}
.h-t.on{color:var(--text3)}.h-t.on::before{background:rgba(50,160,70,0.5)}
.h-sc{font-family:'Outfit',sans-serif;font-size:22px;font-weight:200;color:var(--text2)}
.empty{font-size:12px;color:var(--text3);letter-spacing:1px;text-align:center;padding:32px 0;line-height:2}
.sdiv{height:1px;background:linear-gradient(90deg,transparent,rgba(10,20,12,0.1),transparent);margin:24px 0}

/* LOCK */
.lock{position:fixed;inset:0;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;gap:40px}
.lock.on{display:flex;animation:fi .3s ease}
.lock-bg{position:absolute;inset:0;background:rgba(10,30,12,0.60);backdrop-filter:blur(48px);-webkit-backdrop-filter:blur(48px)}
@keyframes fi{from{opacity:0}to{opacity:1}}
.lock-w{font-family:'DM Serif Display',serif;font-size:64px;font-style:italic;color:rgba(200,240,200,0.18);letter-spacing:-2px;position:relative;z-index:1}
.lock-ls{text-align:center;line-height:2.8;position:relative;z-index:1}
.lock-l{display:block;font-size:11px;color:rgba(200,240,200,0.28);letter-spacing:4px;text-transform:uppercase}
.lock-b{position:absolute;bottom:48px;font-size:9px;color:rgba(200,240,200,0.18);letter-spacing:3px;cursor:pointer;background:none;border:none;text-transform:uppercase;transition:color .2s;z-index:1}
.lock-b:hover{color:rgba(200,240,200,0.4)}

/* TOAST */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(12px);background:rgba(240,250,240,0.72);border:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:10px 24px;border-radius:20px;font-size:11px;letter-spacing:1.5px;color:var(--text2);opacity:0;transition:all .25s ease;pointer-events:none;z-index:300;white-space:nowrap;box-shadow:0 4px 16px var(--shadow)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style></head><body>

<div class="forest"></div>
<div class="mist"></div>
<canvas id="rain"></canvas>

<div class="app">
  <div class="hd">
    <span class="logo">Focus Life</span>
    <div class="pill"><div class="dot"></div><span class="pill-t" id="cd">— —</span></div>
  </div>
  <div class="nav">
    <button class="tab on" onclick="go('gate',this)">今</button>
    <button class="tab" onclick="go('morning',this)">朝</button>
    <button class="tab" onclick="go('night',this)">夜</button>
    <button class="tab" onclick="go('stats',this)">記録</button>
  </div>
  <div class="rule"></div>
  <div class="scroll">
    <div class="pg on" id="pg-gate">
      <div class="g-q">今、開く<em>理由</em>はあるか</div>
      <p class="g-sub">手が無意識に動いていないか、一度立ち止まる</p>
      <div class="axis"><span class="axis-t">23:30</span><span class="axis-s">—</span><span class="axis-t">6:30</span></div>
      <div id="gTasks"></div>
      <div class="btns">
        <button class="btn btn-y" onclick="gOpen()">目的がある</button>
        <button class="btn btn-n" onclick="gLock()">ない、置く</button>
      </div>
    </div>
    <div class="pg" id="pg-morning">
      <div class="lbl">今日やること</div>
      <div class="if-row"><span class="if-n" id="n1">1</span><input class="if-i" id="t1" placeholder="最重要タスク" maxlength="36" oninput="uN()"></div>
      <div class="if-row"><span class="if-n" id="n2">2</span><input class="if-i" id="t2" placeholder="できれば" maxlength="36" oninput="uN()"></div>
      <div class="if-row"><span class="if-n" id="n3">3</span><input class="if-i" id="t3" placeholder="できれば" maxlength="36" oninput="uN()"></div>
      <div class="mood-s">
        <div class="lbl">コンディション</div>
        <div class="mood-r"><div class="pip" onclick="sm(1)"></div><div class="pip" onclick="sm(2)"></div><div class="pip" onclick="sm(3)"></div><div class="pip" onclick="sm(4)"></div><div class="pip" onclick="sm(5)"></div></div>
        <div class="mood-ls"><span class="mood-l">低</span><span class="mood-l">高</span></div>
      </div>
      <button class="btn btn-y" onclick="savM()">今日の意図を設定する</button>
    </div>
    <div class="pg" id="pg-night">
      <div class="lbl">振り返り</div>
      <div id="nC"></div>
      <div style="margin-top:28px;margin-bottom:8px" class="lbl">メモ</div>
      <textarea class="note-f" id="nN" placeholder="明日へ持ち越すことは" rows="3"></textarea>
      <button class="btn btn-y" onclick="savN()">保存する</button>
    </div>
    <div class="pg" id="pg-stats">
      <div class="kpi-r">
        <div class="kpi"><div class="kpi-n" id="ss">0</div><div class="kpi-u">連続日</div></div>
        <div class="kpi"><div class="kpi-n" id="st">0</div><div class="kpi-u">記録日数</div></div>
        <div class="kpi"><div class="kpi-n" id="sa">—</div><div class="kpi-u">達成率</div></div>
      </div>
      <div class="card"><div class="lbl">過去7日間</div><div class="bars" id="bc"></div></div>
      <div class="sdiv"></div>
      <div class="lbl">履歴</div>
      <div id="hl"></div>
    </div>
  </div>
</div>

<div class="lock" id="lock">
  <div class="lock-bg"></div>
  <div class="lock-w">置く</div>
  <div class="lock-ls">
    <span class="lock-l">23:30 就寝</span>
    <span class="lock-l">6:30 起床</span>
    <span class="lock-l" style="margin-top:8px;color:rgba(180,240,180,0.12)">それが軸だ</span>
  </div>
  <button class="lock-b" onclick="cL()">戻る</button>
</div>
<div class="toast" id="toast"></div>

<script>
// RAIN + DRIP
(function(){
  const cv=document.getElementById('rain'),ctx=cv.getContext('2d');
  let W,H,drops=[],drips=[];
  function rsz(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  rsz();window.addEventListener('resize',rsz);

  function mkD(){return{x:Math.random()*W,y:Math.random()*-H,len:6+Math.random()*14,spd:7+Math.random()*10,op:0.06+Math.random()*0.10,w:0.4+Math.random()*0.7};}
  function mkP(){return{x:Math.random()*W,y:Math.random()*H*0.4,vy:0.3+Math.random()*1.0,r:1.2+Math.random()*2.8,op:0.14+Math.random()*0.22,trail:[],wb:Math.random()*Math.PI*2,ws:0.015+Math.random()*0.03};}

  for(let i=0;i<100;i++)drops.push(mkD());
  for(let i=0;i<28;i++)drips.push(mkP());

  function draw(){
    ctx.clearRect(0,0,W,H);
    // rain streaks — blue-green tint
    drops.forEach(d=>{
      ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x-d.len*0.06,d.y+d.len);
      ctx.strokeStyle=`rgba(160,220,170,${d.op})`;ctx.lineWidth=d.w;ctx.stroke();
      d.y+=d.spd;if(d.y>H+20){Object.assign(d,mkD());d.y=-20;}
    });
    // glass drips
    drips.forEach(d=>{
      d.trail.push({x:d.x,y:d.y});
      if(d.trail.length>22)d.trail.shift();
      if(d.trail.length>1){
        ctx.beginPath();ctx.moveTo(d.trail[0].x,d.trail[0].y);
        for(let i=1;i<d.trail.length;i++)ctx.lineTo(d.trail[i].x,d.trail[i].y);
        ctx.strokeStyle=`rgba(200,240,200,${d.op*0.45})`;
        ctx.lineWidth=d.r*0.65;ctx.lineCap='round';ctx.stroke();
      }
      // droplet head with green tint
      const g=ctx.createRadialGradient(d.x,d.y,0,d.x,d.y,d.r);
      g.addColorStop(0,`rgba(230,255,230,${d.op*0.9})`);
      g.addColorStop(1,`rgba(180,230,180,${d.op*0.3})`);
      ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
      // specular highlight
      ctx.beginPath();ctx.arc(d.x-d.r*0.3,d.y-d.r*0.3,d.r*0.25,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${d.op*0.6})`;ctx.fill();

      d.wb+=d.ws;d.x+=Math.sin(d.wb)*0.5;d.vy*=1.003;d.y+=d.vy;
      if(d.y>H+20){Object.assign(d,mkP());d.trail=[];}
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// APP LOGIC
const S={load(){try{return JSON.parse(localStorage.getItem('fl8')||'{}')}catch{return{}}},save(d){localStorage.setItem('fl8',JSON.stringify(d))}};
function dk(){const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;}
let db=S.load(),mood=0;

(function tick(){const n=new Date();let d=(23*60+30)-(n.getHours()*60+n.getMinutes());if(d<0)d+=1440;const h=Math.floor(d/60),m=d%60;document.getElementById('cd').textContent=d===0?'就寝時間':h>0?`${h}h ${String(m).padStart(2,'0')}m`:`${m}m`;setTimeout(tick,10000);})();

function go(name,btn){document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));document.getElementById('pg-'+name).classList.add('on');btn.classList.add('on');db=S.load();if(name==='gate')rG();if(name==='morning')lM();if(name==='night')rN();if(name==='stats')rSt();}
function rG(){const td=db[dk()],el=document.getElementById('gTasks');if(!td?.tasks?.some(Boolean)){el.innerHTML='';return;}el.innerHTML='<div class="lbl" style="margin-bottom:12px">今日やること</div>'+td.tasks.filter(Boolean).map((t,i)=>`<div class="tp-item"><span class="tp-n">0${i+1}</span><span class="tp-t">${t}</span></div>`).join('');}
function gOpen(){const p=prompt('何のために');if(!p)return;const k=dk();db[k]=db[k]||{};db[k].opens=db[k].opens||[];db[k].opens.push({t:new Date().toISOString(),p});S.save(db);toast('了解');}
function gLock(){document.getElementById('lock').classList.add('on');}
function cL(){document.getElementById('lock').classList.remove('on');}
function uN(){['t1','t2','t3'].forEach((id,i)=>{document.getElementById('n'+(i+1)).classList.toggle('on',!!document.getElementById(id).value);});}
function lM(){const td=db[dk()];if(!td)return;if(td.tasks)td.tasks.forEach((t,i)=>{if(t){const el=document.getElementById('t'+(i+1));if(el)el.value=t;}});if(td.mood)sm(td.mood);uN();}
function sm(v){mood=v;document.querySelectorAll('.pip').forEach((s,i)=>s.classList.toggle('on',i<v));}
function savM(){const tasks=['t1','t2','t3'].map(id=>document.getElementById(id).value.trim());if(!tasks[0]){toast('最重要タスクを入力してください');return;}const k=dk();db[k]=db[k]||{};db[k].tasks=tasks;db[k].mood=mood;db[k].mAt=new Date().toISOString();S.save(db);toast('設定しました');}
function rN(){const td=db[dk()],el=document.getElementById('nC');if(!td?.tasks?.some(Boolean)){el.innerHTML='<div class="empty">先に朝の意図を設定してください</div>';return;}const ch=td.checks||[false,false,false];el.innerHTML=td.tasks.map((t,i)=>t?`<div class="ci" onclick="tc(${i})"><div class="ck ${ch[i]?'on':''}" id="ck${i}"></div><div class="ct ${ch[i]?'on':''}" id="ct${i}">${t}</div></div>`:'').join('');const nn=document.getElementById('nN');if(td.note)nn.value=td.note;}
function tc(i){const k=dk();db[k]=db[k]||{};db[k].checks=db[k].checks||[false,false,false];db[k].checks[i]=!db[k].checks[i];S.save(db);const on=db[k].checks[i];document.getElementById('ck'+i).classList.toggle('on',on);document.getElementById('ct'+i).classList.toggle('on',on);}
function savN(){const k=dk();db[k]=db[k]||{};db[k].note=document.getElementById('nN').value;db[k].nAt=new Date().toISOString();const tasks=(db[k].tasks||[]).filter(Boolean),ch=db[k].checks||[];db[k].score=tasks.length?Math.round(tasks.filter((_,i)=>ch[i]).length/tasks.length*100):0;S.save(db);toast('保存しました');}
function rSt(){const keys=Object.keys(db).filter(k=>/^\d{4}-\d{2}-\d{2}$/.test(k)).sort();const total=keys.filter(k=>db[k].nAt).length,today=new Date();let streak=0;for(let i=0;i<365;i++){const d=new Date(today);d.setDate(d.getDate()-i);const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;if(db[k]?.nAt)streak++;else if(i>0)break;}const sc=keys.filter(k=>db[k].score!=null).map(k=>db[k].score);document.getElementById('ss').textContent=streak;document.getElementById('st').textContent=total;document.getElementById('sa').textContent=sc.length?Math.round(sc.reduce((a,b)=>a+b,0)/sc.length)+'%':'—';const chart=document.getElementById('bc'),days=['日','月','火','水','木','金','土'];chart.innerHTML='';for(let i=6;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;const s=db[k]?.score;const h=s!=null?Math.max(s*.76,4):4;chart.innerHTML+=`<div class="bc"><div class="bf ${i===0?'t':s!=null?'d':''}" style="height:${h}px"></div><div class="bd">${days[d.getDay()]}</div></div>`;}const hl=document.getElementById('hl');const recs=keys.filter(k=>db[k].mAt||db[k].nAt).reverse().slice(0,20);if(!recs.length){hl.innerHTML='<div class="empty">記録なし</div>';return;}hl.innerHTML=recs.map(k=>{const r=db[k],ts=(r.tasks||[]).filter(Boolean),ch=r.checks||[];return`<div class="h-row"><div class="h-d">${k.slice(5)}</div><div class="h-ts">${ts.map((t,i)=>`<div class="h-t ${ch[i]?'on':''}">${t}</div>`).join('')||'<div class="h-t" style="color:var(--text3)">—</div>'}</div>${r.score!=null?`<div class="h-sc">${r.score}<span style="font-size:11px;color:var(--text3)">%</span></div>`:''}</div>`;}).join('');}
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('on');setTimeout(()=>el.classList.remove('on'),2200);}
</script></body></html>
